<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-dark: #0f0f23;
            --bg-card: rgba(255,255,255,0.05);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(255,255,255,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }
        
        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
            animation: bgPulse 10s ease-in-out infinite;
        }
        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
        }
        header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        header p {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 300;
        }
        
        /* 统计栏 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        /* 上传区域 */
        .upload-section {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 40px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .upload-section:hover, .upload-section.dragover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transform: rotate(45deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }
        .upload-text {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        .upload-hint {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        #fileInput {
            display: none;
        }
        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 25px;
            border: none;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .upload-btn:disabled {
            background: #444;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* 进度条 */
        .progress-container {
            margin-top: 25px;
            display: none;
        }
        .progress-container.active {
            display: block;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            width: 0%;
            transition: width 0.3s;
            border-radius: 3px;
        }
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        /* 状态提示 */
        .status {
            margin-top: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }
        .status.success {
            background: rgba(40, 167, 69, 0.2);
            color: #75b798;
            border: 1px solid rgba(40, 167, 69, 0.3);
            display: block;
        }
        .status.error {
            background: rgba(220, 53, 69, 0.2);
            color: #ea868f;
            border: 1px solid rgba(220, 53, 69, 0.3);
            display: block;
        }
        .status.loading {
            background: rgba(255, 193, 7, 0.2);
            color: #ffda6a;
            border: 1px solid rgba(255, 193, 7, 0.3);
            display: block;
        }
        
        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .toolbar-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .toolbar-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: var(--primary);
        }
        
        /* 照片网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .photo-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            cursor: pointer;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: rgba(102, 126, 234, 0.3);
        }
        .photo-wrapper {
            position: relative;
            padding-top: 75%; /* 4:3 比例 */
            overflow: hidden;
        }
        .photo-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .photo-card:hover .photo-wrapper img {
            transform: scale(1.05);
        }
        .photo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }
        .photo-card:hover .photo-overlay {
            opacity: 1;
        }
        .photo-actions {
            display: flex;
            gap: 10px;
        }
        .photo-action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .photo-action-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
        .photo-action-btn.delete:hover {
            background: rgba(220, 53, 69, 0.8);
        }
        .photo-info {
            padding: 15px 20px;
        }
        .photo-name {
            font-size: 0.95rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .photo-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-muted);
        }
        .empty-state svg {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
            opacity: 0.3;
        }
        .empty-state h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        .empty-state p {
            font-size: 1rem;
        }
        
        /* 大图预览 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .lightbox-close:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
            .upload-section {
                padding: 40px 20px;
            }
            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="container">
        <header>
            <h1>📸 我的云端相册</h1>
            <p>照片自动同步到 GitHub，永久保存</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="photoCount">0</div>
                <div class="stat-label">照片数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="albumSize">0MB</div>
                <div class="stat-label">相册大小</div>
            </div>
        </div>

        <div class="upload-section" id="dropZone">
            <span class="upload-icon">☁️</span>
            <div class="upload-text">拖拽照片到此处，或点击上传</div>
            <div class="upload-hint">支持 JPG、PNG、GIF、WebP 格式</div>
            <label for="fileInput" class="upload-btn" id="uploadBtn">
                选择照片
            </label>
            <input type="file" id="fileInput" accept="image/*" multiple>
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText"></div>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div class="toolbar">
            <div class="toolbar-title">我的照片</div>
            <div class="toolbar-actions">
                <button class="btn" onclick="loadPhotos()">
                    🔄 刷新
                </button>
            </div>
        </div>

        <div class="gallery" id="gallery"></div>

        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <h2>相册是空的</h2>
            <p>上传你的第一张照片，开始记录美好瞬间</p>
        </div>
    </div>

    <!-- 大图预览 -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">×</button>
        <img src="" alt="" id="lightboxImg">
    </div>

    <script>
        // 从环境变量或配置文件加载 Token
        const CONFIG = {
            owner: 'xiaobubuya',
            repo: 'image',
            branch: 'master',
            cdnBase: 'https://cdn.jsdelivr.net/gh/xiaobubuya/image@master',
            // Token 需要在页面加载后通过其他方式设置
            token: localStorage.getItem('githubToken') || ''
        };

        // 如果 Token 不存在，提示用户输入
        if (!CONFIG.token) {
            const token = prompt('请输入 GitHub Token 以使用上传功能：\n（Token 仅保存在浏览器本地）');
            if (token) {
                localStorage.setItem('githubToken', token);
                CONFIG.token = token;
                location.reload();
            }
        }

        let photos = [];
        
        // 初始化
        loadPhotos();
        setupDragDrop();

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            if (type !== 'loading') {
                setTimeout(() => status.className = 'status', 3000);
            }
        }

        function updateProgress(current, total, filename) {
            const container = document.getElementById('progressContainer');
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            
            const percent = total > 0 ? (current / total) * 100 : 0;
            
            container.classList.add('active');
            fill.style.width = percent + '%';
            text.textContent = filename ? `正在上传 ${filename} (${current}/${total})` : '';
            
            if (percent >= 100) {
                setTimeout(() => container.classList.remove('active'), 1000);
            }
        }

        // 拖拽上传
        function setupDragDrop() {
            const dropZone = document.getElementById('dropZone');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
            });
            
            dropZone.addEventListener('drop', handleDrop, false);
        }

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        // 文件选择
        document.getElementById('fileInput').addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });

        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            if (files.length === 0) return;

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;

            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                updateProgress(i + 1, files.length, files[i].name);
                
                try {
                    await uploadToGitHub(files[i]);
                    successCount++;
                } catch (error) {
                    console.error('Upload failed:', error);
                }
            }

            updateProgress(files.length, files.length);
            uploadBtn.disabled = false;

            if (successCount > 0) {
                showStatus(`成功上传 ${successCount} 张照片`, 'success');
                setTimeout(loadPhotos, 2000);
            } else {
                showStatus('上传失败，请重试', 'error');
            }

            document.getElementById('fileInput').value = '';
        }

        async function uploadToGitHub(file) {
            const timestamp = Date.now();
            const filename = `gallery/${timestamp}_${file.name}`;
            
            const base64Content = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${CONFIG.token}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({
                    message: `Upload ${file.name}`,
                    content: base64Content,
                    branch: CONFIG.branch
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message);
            }

            return response.json();
        }

        // 加载照片
        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            const emptyState = document.getElementById('emptyState');

            showStatus('正在加载照片...', 'loading');

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery?ref=${CONFIG.branch}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        photos = [];
                        updateStats();
                        gallery.style.display = 'none';
                        emptyState.style.display = 'block';
                        showStatus('', '');
                        return;
                    }
                    throw new Error('Failed to load');
                }

                const files = await response.json();
                photos = files.filter(f => 
                    f.type === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name)
                ).sort((a, b) => b.name.localeCompare(a.name));

                updateStats();

                if (photos.length === 0) {
                    gallery.style.display = 'none';
                    emptyState.style.display = 'block';
                    showStatus('', '');
                    return;
                }

                gallery.style.display = 'grid';
                emptyState.style.display = 'none';

                gallery.innerHTML = photos.map((file, index) => {
                    const name = file.name.replace(/^\d+_/, '');
                    const date = new Date(parseInt(file.name.split('_')[0])).toLocaleString('zh-CN');
                    
                    return `
                        <div class="photo-card" onclick="openLightbox(${index})">
                            <div class="photo-wrapper">
                                <img src="${CONFIG.cdnBase}/gallery/${file.name}" alt="${name}" loading="lazy">
                                <div class="photo-overlay">
                                    <div class="photo-actions" onclick="event.stopPropagation()">
                                        <button class="photo-action-btn" onclick="openLightbox(${index})" title="查看大图">👁</button>
                                        <button class="photo-action-btn delete" onclick="deletePhoto('${file.name}', '${file.sha}')" title="删除">🗑</button>
                                    </div>
                                </div>
                            </div>
                            <div class="photo-info">
                                <div class="photo-name">${name}</div>
                                <div class="photo-date">${date}</div>
                            </div>
                        </div>
                    `;
                }).join('');

                showStatus(`已加载 ${photos.length} 张照片`, 'success');
                setTimeout(() => showStatus('', ''), 2000);

            } catch (error) {
                console.error('Load failed:', error);
                gallery.style.display = 'none';
                emptyState.style.display = 'block';
                showStatus('加载失败，请稍后重试', 'error');
            }
        }

        function updateStats() {
            document.getElementById('photoCount').textContent = photos.length;
            // 估算大小（GitHub API 不直接返回文件大小，这里简化处理）
            const totalSize = photos.reduce((sum, p) => sum + (p.size || 0), 0);
            const sizeMB = (totalSize / 1024 / 1024).toFixed(1);
            document.getElementById('albumSize').textContent = totalSize > 0 ? `${sizeMB}MB` : '0MB';
        }

        // 删除照片
        async function deletePhoto(filename, sha) {
            if (!confirm('确定要删除这张照片吗？')) return;

            showStatus('正在删除...', 'loading');

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery/${filename}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Delete ${filename}`,
                        sha: sha,
                        branch: CONFIG.branch
                    })
                });

                if (!response.ok) throw new Error('Delete failed');

                showStatus('删除成功', 'success');
                setTimeout(loadPhotos, 1000);
            } catch (error) {
                showStatus('删除失败', 'error');
            }
        }

        // 大图预览
        function openLightbox(index) {
            const file = photos[index];
            if (!file) return;
            
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            
            img.src = `${CONFIG.cdnBase}/gallery/${file.name}`;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ESC 关闭预览
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
