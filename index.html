<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端相册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-dark: #0f0f23;
            --bg-card: rgba(255,255,255,0.05);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(255,255,255,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
        }
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }
        @keyframes bgPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box p { color: var(--text-muted); margin-bottom: 40px; }
        .login-box input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        .login-box input:focus { border-color: var(--primary); }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .login-error {
            margin-top: 20px;
            padding: 12px;
            background: rgba(220, 53, 69, 0.2);
            color: #ea868f;
            border-radius: 8px;
            display: none;
        }
        
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }
        .main-container.active { display: block; }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
        }
        .user-bar span { color: var(--text-muted); padding: 8px 0; }
        .user-bar button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); }
        
        .upload-section {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            margin-bottom: 40px;
            transition: all 0.3s;
        }
        .upload-section.dragover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-icon { font-size: 3rem; margin-bottom: 15px; }
        .upload-text { font-size: 1.2rem; margin-bottom: 10px; }
        .upload-hint { color: var(--text-muted); font-size: 0.9rem; }
        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
        #fileInput { display: none; }
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .status.success { background: rgba(40, 167, 69, 0.2); color: #75b798; display: block; }
        .status.error { background: rgba(220, 53, 69, 0.2); color: #ea868f; display: block; }
        .status.loading { background: rgba(255, 193, 7, 0.2); color: #ffda6a; display: block; }
        
        /* 骨架屏 */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .photo-wrapper {
            position: relative;
            padding-top: 75%;
            overflow: hidden;
            background: rgba(255,255,255,0.02);
        }
        .photo-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.5s, opacity 0.3s;
            opacity: 0;
        }
        .photo-wrapper img.loaded {
            opacity: 1;
        }
        .photo-wrapper img:hover { transform: scale(1.05); }
        .photo-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }
        .photo-card:hover .photo-overlay { opacity: 1; }
        .photo-actions { display: flex; gap: 10px; }
        .photo-action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        .photo-action-btn:hover { background: rgba(255,255,255,0.3); }
        .photo-action-btn.delete:hover { background: rgba(220, 53, 69, 0.8); }
        .photo-info { padding: 15px; }
        .photo-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .photo-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            display: none;
        }
        .empty-state.active { display: block; }
        .empty-state svg { width: 100px; height: 100px; margin-bottom: 20px; opacity: 0.3; }
        
        .load-more {
            text-align: center;
            padding: 40px;
        }
        .load-more button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
        .load-more button:hover { border-color: var(--primary); }
        .load-more button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; object-fit: contain; }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 50px; height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .lightbox-nav:hover { background: rgba(255,255,255,0.2); }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        
        .cache-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: none;
        }
        .cache-info.active { display: block; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>📸 云端相册</h1>
            <p>请登录以管理照片</p>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="login()">登 录</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>
    
    <div class="main-container" id="mainPage">
        <header><h1>我的云端相册</h1></header>
        
        <div class="user-bar">
            <span id="welcomeUser"></span>
            <button onclick="refreshPhotos()">🔄 刷新</button>
            <button onclick="logout()">退出登录</button>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="photoCount">0</div>
                <div class="stat-label">照片数量</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="cacheStatus">-</div>
                <div class="stat-label">缓存状态</div>
            </div>
        </div>
        
        <div class="upload-section" id="dropZone">
            <div class="upload-icon">☁️</div>
            <div class="upload-text">拖拽照片到此处，或点击上传</div>
            <div class="upload-hint">支持 JPG、PNG、GIF、WebP 格式</div>
            <label for="fileInput" class="upload-btn">选择照片</label>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div id="progressText" style="margin-top:10px;color:var(--text-muted)"></div>
            </div>
            <div class="status" id="status"></div>
        </div>
        
        <div class="gallery" id="gallery"></div>
        
        <div class="load-more" id="loadMore" style="display:none">
            <button onclick="loadMorePhotos()">加载更多</button>
        </div>
        
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <h2>相册是空的</h2>
            <p>上传你的第一张照片</p>
        </div>
    </div>
    
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <button class="lightbox-nav lightbox-prev" onclick="prevPhoto()">‹</button>
        <button class="lightbox-nav lightbox-next" onclick="nextPhoto()">›</button>
        <img src="" id="lightboxImg">
    </div>
    
    <div class="cache-info" id="cacheInfo">从缓存加载</div>

    <script>
        // 账号配置
        const ACCOUNTS = { 'yuge': '20250918', 'meimei': '20250918' };
        
        // GitHub 配置
        const CONFIG = {
            owner: 'xiaobubuya',
            repo: 'image',
            branch: 'master',
            cdnBase: 'https://cdn.jsdelivr.net/gh/xiaobubuya/image@master',
            rawBase: 'https://raw.githubusercontent.com/xiaobubuya/image/master'
        };

        // GitHub Token 占位符，部署时由 GitHub Actions 替换
        const HARDCODED_TOKEN = 'WjJod1gzQnNWa3RrZURJM1pHb3dXa3BvWWxNNFZIUjVSM2t5U0dOalpWVmlSREZMZWt0bmJnPT0=';
        const decodedToken = base64Decode(base64Decode(HARDCODED_TOKEN));


        let currentUser = null;
        let githubToken = decodedToken;
        let photos = [];
        let displayedPhotos = [];
        let currentPage = 0;
        const PHOTOS_PER_PAGE = 20;
        let currentLightboxIndex = 0;

        // IndexedDB 配置
        const DB_NAME = 'GalleryDB';
        const DB_VERSION = 1;
        let db = null;

        // 初始化
        init();

        async function init() {
            await initDB();
            const savedUser = localStorage.getItem('galleryUser');
            if (savedUser) {
                currentUser = savedUser;
                showMainPage();
            }
        }

        // 初始化 IndexedDB
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => { db = request.result; resolve(); };
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('photos')) {
                        db.createObjectStore('photos', { keyPath: 'name' });
                    }
                    if (!db.objectStoreNames.contains('metadata')) {
                        db.createObjectStore('metadata', { keyPath: 'key' });
                    }
                };
            });
        }

        // 缓存操作
        async function getCachedPhotos() {
            if (!db) return null;
            return new Promise((resolve) => {
                const tx = db.transaction('photos', 'readonly');
                const store = tx.objectStore('photos');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });
        }

        async function cachePhotos(photos) {
            if (!db) return;
            const tx = db.transaction('photos', 'readwrite');
            const store = tx.objectStore('photos');
            photos.forEach(p => store.put(p));
        }

        async function getCacheTime() {
            if (!db) return null;
            return new Promise((resolve) => {
                const tx = db.transaction('metadata', 'readonly');
                const store = tx.objectStore('metadata');
                const request = store.get('cacheTime');
                request.onsuccess = () => resolve(request.result?.value || null);
                request.onerror = () => resolve(null);
            });
        }

        async function setCacheTime() {
            if (!db) return;
            const tx = db.transaction('metadata', 'readwrite');
            const store = tx.objectStore('metadata');
            store.put({ key: 'cacheTime', value: Date.now() });
        }

        async function clearCache() {
            if (!db) return;
            const tx1 = db.transaction('photos', 'readwrite');
            tx1.objectStore('photos').clear();
            const tx2 = db.transaction('metadata', 'readwrite');
            tx2.objectStore('metadata').clear();
        }

        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.textContent = '请输入用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }

            if (ACCOUNTS[username] === password) {
                currentUser = username;
                localStorage.setItem('galleryUser', username);
                showMainPage();
            } else {
                errorDiv.textContent = '用户名或密码错误';
                errorDiv.style.display = 'block';
            }
        }

        async function showMainPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('welcomeUser').textContent = `欢迎，${currentUser}`;
            setupDragDrop();
            await loadPhotos();
        }

        function logout() {
            localStorage.removeItem('galleryUser');
            location.reload();
        }

        function setupDragDrop() {
            const dropZone = document.getElementById('dropZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(e => {
                dropZone.addEventListener(e, () => dropZone.classList.add('dragover'), false);
            });
            ['dragleave', 'drop'].forEach(e => {
                dropZone.addEventListener(e, () => dropZone.classList.remove('dragover'), false);
            });
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files), false);
        }

        document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

        function showStatus(msg, type) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status ' + type;
            if (type !== 'loading') setTimeout(() => s.className = 'status', 3000);
        }

        function updateProgress(current, total, filename) {
            const c = document.getElementById('progressContainer');
            const f = document.getElementById('progressFill');
            const t = document.getElementById('progressText');
            const pct = total > 0 ? (current / total) * 100 : 0;
            c.classList.add('active');
            f.style.width = pct + '%';
            t.textContent = filename ? `上传中 ${filename} (${current}/${total})` : '';
            if (pct >= 100) setTimeout(() => c.classList.remove('active'), 1000);
        }

        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;

            let success = 0;
            for (let i = 0; i < files.length; i++) {
                updateProgress(i + 1, files.length, files[i].name);
                try {
                    await uploadFile(files[i]);
                    success++;
                } catch (e) { console.error(e); }
            }
            updateProgress(files.length, files.length);
            showStatus(success > 0 ? `成功上传 ${success} 张照片` : '上传失败', success > 0 ? 'success' : 'error');
            if (success) {
                await clearCache();
                setTimeout(() => refreshPhotos(), 2000);
            }
            document.getElementById('fileInput').value = '';
        }

        async function uploadFile(file) {
            const filename = `gallery/${Date.now()}_${file.name}`;
            const base64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ message: `Upload ${file.name}`, content: base64, branch: CONFIG.branch })
            });
            if (!res.ok) throw new Error('Upload failed');
        }

        // 优先使用 raw.githubusercontent，失败时回退到 jsdelivr
        function getImageUrl(filename) {
            return `${CONFIG.rawBase}/gallery/${filename}`;
        }

        // 从服务器获取最新数据
        async function fetchFromServer() {
            const headers = { 'Accept': 'application/vnd.github.v3+json' };
            // 如果有 token，添加到请求头提高速率限制
            if (githubToken) {
                headers['Authorization'] = `token ${githubToken}`;
            }
            
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery?ref=${CONFIG.branch}`, {
                headers: headers
            });
            return res;
        }

        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('emptyState');
            const cacheInfo = document.getElementById('cacheInfo');
            
            // 先尝试从缓存加载
            const cached = await getCachedPhotos();
            const cacheTime = await getCacheTime();
            
            if (cached && cached.length > 0) {
                photos = cached;
                document.getElementById('photoCount').textContent = photos.length;
                document.getElementById('cacheStatus').textContent = '已缓存';
                renderPhotos(true);
                cacheInfo.classList.add('active');
                setTimeout(() => cacheInfo.classList.remove('active'), 2000);
            } else {
                gallery.innerHTML = '<div class="skeleton" style="height:200px"></div>'.repeat(6);
            }
            
            // 然后从服务器获取最新数据
            try {
                const res = await fetchFromServer();
                
                if (!res.ok) {
                    // 401 - Token 无效
                    if (res.status === 401) {
                        console.error('GitHub Token 无效或已过期');
                        showStatus('GitHub Token 无效，请重新输入', 'error');
                        document.getElementById('cacheStatus').textContent = 'Token无效';
                        // 清除无效 token
                        localStorage.removeItem('githubToken');
                        githubToken = '';
                        // 3秒后提示输入新 token
                        setTimeout(() => {
                            const newToken = prompt('GitHub Token 无效或已过期，请输入新的 Token：');
                            if (newToken) {
                                localStorage.setItem('githubToken', newToken);
                                githubToken = newToken;
                                loadPhotos();
                            }
                        }, 3000);
                        return;
                    }
                    if (res.status === 404) {
                        photos = [];
                        gallery.innerHTML = '';
                        empty.classList.add('active');
                        document.getElementById('loadMore').style.display = 'none';
                        return;
                    }
                    // 如果是速率限制错误，显示提示
                    if (res.status === 403) {
                        const errorData = await res.json().catch(() => ({}));
                        if (errorData.message && errorData.message.includes('rate limit')) {
                            showStatus('API 请求太频繁，请稍后再试', 'error');
                            document.getElementById('cacheStatus').textContent = '受限';
                            return;
                        }
                    }
                    throw new Error(`HTTP ${res.status}`);
                }
                
                const files = await res.json();
                const newPhotos = files
                    .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name))
                    .map(f => ({
                        name: f.name,
                        sha: f.sha,
                        size: f.size,
                        timestamp: parseInt(f.name.split('_')[0]) || 0
                    }))
                    .sort((a, b) => b.timestamp - a.timestamp);
                
                // 检查是否有变化
                const hasChanged = JSON.stringify(newPhotos) !== JSON.stringify(photos);
                
                if (hasChanged || photos.length === 0) {
                    photos = newPhotos;
                    await cachePhotos(photos);
                    await setCacheTime();
                    document.getElementById('cacheStatus').textContent = '已同步';
                    renderPhotos();
                    showStatus(`已加载 ${photos.length} 张照片`, 'success');
                } else {
                    document.getElementById('cacheStatus').textContent = '最新';
                }
                
                document.getElementById('photoCount').textContent = photos.length;
                
            } catch (e) {
                console.error('Load error:', e);
                if (!cached || cached.length === 0) {
                    showStatus('加载失败，请检查网络', 'error');
                }
            }
        }

        async function refreshPhotos() {
            await clearCache();
            currentPage = 0;
            displayedPhotos = [];
            await loadPhotos();
        }

        function renderPhotos(append = false) {
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('emptyState');
            const loadMore = document.getElementById('loadMore');
            
            if (!photos.length) {
                empty.classList.add('active');
                loadMore.style.display = 'none';
                if (!append) gallery.innerHTML = '';
                return;
            }
            
            empty.classList.remove('active');
            
            // 计算要显示的照片
            const start = append ? displayedPhotos.length : 0;
            const end = Math.min(start + PHOTOS_PER_PAGE, photos.length);
            const pagePhotos = photos.slice(start, end);
            
            if (!append) {
                gallery.innerHTML = '';
                displayedPhotos = [];
            }
            
            displayedPhotos = displayedPhotos.concat(pagePhotos);
            
            // 渲染照片卡片
            pagePhotos.forEach((p, idx) => {
                const actualIndex = start + idx;
                const name = p.name.replace(/^\d+_/, '');
                const date = p.timestamp ? new Date(p.timestamp).toLocaleString('zh-CN') : '-';
                
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.style.animationDelay = `${idx * 0.05}s`;
                card.innerHTML = `
                    <div class="photo-wrapper">
                        <img data-src="${getImageUrl(p.name)}" alt="${name}" loading="lazy">
                        <div class="photo-overlay" onclick="event.stopPropagation()">
                            <div class="photo-actions">
                                <button class="photo-action-btn" onclick="openLightbox(${actualIndex})">👁</button>
                                <button class="photo-action-btn delete" onclick="deletePhoto('${p.name}', '${p.sha}')">🗑</button>
                            </div>
                        </div>
                    </div>
                    <div class="photo-info">
                        <div class="photo-name">${name}</div>
                        <div class="photo-date">${date}</div>
                    </div>
                `;
                card.onclick = () => openLightbox(actualIndex);
                gallery.appendChild(card);
                
                // 懒加载图片
                const img = card.querySelector('img');
                if ('IntersectionObserver' in window) {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const img = entry.target;
                                img.src = img.dataset.src;
                                img.onload = () => img.classList.add('loaded');
                                observer.unobserve(img);
                            }
                        });
                    }, { rootMargin: '50px' });
                    observer.observe(img);
                } else {
                    img.src = img.dataset.src;
                    img.onload = () => img.classList.add('loaded');
                }
            });
            
            // 显示/隐藏加载更多按钮
            if (end < photos.length) {
                loadMore.style.display = 'block';
            } else {
                loadMore.style.display = 'none';
            }
        }

        function loadMorePhotos() {
            renderPhotos(true);
        }

        async function deletePhoto(filename, sha) {
            if (!confirm('确定删除？')) return;
            showStatus('删除中...', 'loading');
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery/${filename}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ message: `Delete ${filename}`, sha, branch: CONFIG.branch })
                });
                if (!res.ok) throw new Error();
                
                // 更新缓存
                photos = photos.filter(p => p.name !== filename);
                await cachePhotos(photos);
                
                showStatus('删除成功', 'success');
                currentPage = 0;
                displayedPhotos = [];
                renderPhotos();
            } catch (e) {
                showStatus('删除失败', 'error');
            }
        }

        function openLightbox(index) {
            currentLightboxIndex = index;
            updateLightboxImage();
            document.getElementById('lightbox').classList.add('active');
        }

        function updateLightboxImage() {
            const p = photos[currentLightboxIndex];
            if (!p) return;
            document.getElementById('lightboxImg').src = getImageUrl(p.name);
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function prevPhoto() {
            if (currentLightboxIndex > 0) {
                currentLightboxIndex--;
                updateLightboxImage();
            }
        }

        function nextPhoto() {
            if (currentLightboxIndex < photos.length - 1) {
                currentLightboxIndex++;
                updateLightboxImage();
            }
        }

        /**
         * Base64 解码函数（兼容浏览器和 Node.js）
         * @param {string} base64Str - 待解码的 Base64 字符串
         * @returns {string} 解码后的原始字符串
         */
        function base64Decode(base64Str) {
          try {
            // 处理 Base64 填充字符缺失的情况（避免解码失败）
            const paddedStr = base64Str.padEnd(base64Str.length + (4 - base64Str.length % 4) % 4, '=');
            
            let decoded;
            // 浏览器环境
            if (typeof window !== 'undefined' && window.atob) {
              decoded = window.atob(paddedStr);
            } 
            // Node.js 环境
            else if (typeof Buffer !== 'undefined') {
              decoded = Buffer.from(paddedStr, 'base64').toString('utf8');
            } 
            // 不支持的环境
            else {
              throw new Error('当前环境不支持 Base64 解码');
            }
        
            return decoded;
          } catch (error) {
            console.error('Base64 解码失败：', error.message);
            return ''; // 解码失败返回空字符串，避免程序崩溃
          }
        }

        // 键盘导航
        document.addEventListener('keydown', e => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'ArrowRight') nextPhoto();
        });

        // 点击空白处关闭
        document.getElementById('lightbox').addEventListener('click', e => {
            if (e.target.id === 'lightbox') closeLightbox();
        });
    </script>
</body>
