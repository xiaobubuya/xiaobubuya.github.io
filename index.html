<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说站 - xiaobubuya</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f0eb;
      color: #333;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #2c1810 0%, #4a2c1a 100%);
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }
    .header h1 { font-size: 28px; font-weight: 300; letter-spacing: 4px; margin-bottom: 8px; }
    .header p { font-size: 14px; opacity: 0.7; }
    .container { max-width: 800px; margin: 0 auto; padding: 30px 20px; }
    .novel-list { display: flex; flex-direction: column; gap: 16px; }
    .novel-card {
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .novel-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .novel-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .novel-meta { font-size: 13px; color: #999; margin-bottom: 8px; }
    .novel-desc { font-size: 14px; color: #666; line-height: 1.6; }
    .empty { text-align: center; padding: 60px 20px; color: #999; }
    .empty p { font-size: 16px; margin-bottom: 8px; }
    .footer {
      text-align: center;
      padding: 30px;
      color: #999;
      font-size: 12px;
    }
    @media (max-width: 600px) {
      .header { padding: 30px 16px; }
      .header h1 { font-size: 22px; }
      .novel-card { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📖 小说小站</h1>
    <p>写故事的人</p>
  </div>
  <div class="container">
    <div id="novel-list" class="novel-list">
      <div class="empty"><p>加载中...</p></div>
    </div>
  </div>
  <div class="footer">
    <p>&copy; 2026 xiaobubuya</p>
  </div>
  <script>
    fetch('novels/index.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(data => {
        const list = document.getElementById('novel-list');
        if (!data.novels || data.novels.length === 0) {
          list.innerHTML = '<div class="empty"><p>📝 暂无小说</p><p>敬请期待</p></div>';
          return;
        }
        list.innerHTML = data.novels.map(n => `
          <a href="novel.html?name=${encodeURIComponent(n.name)}" class="novel-card">
            <div class="novel-title">${n.title}</div>
            <div class="novel-meta">${n.type} · ${n.style} · ${n.chapters}章 · ${n.words}字</div>
            <div class="novel-desc">${n.desc || ''}</div>
          </a>
        `).join('');
      })
      .catch(() => {
        document.getElementById('novel-list').innerHTML = '<div class="empty"><p>📝 暂无小说</p><p>敬请期待</p></div>';
      });
  </script>
</body>
</html>
