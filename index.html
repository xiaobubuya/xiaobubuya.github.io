<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端相册</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg-dark: #0f0f23;
            --bg-card: rgba(255,255,255,0.05);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.6);
            --border: rgba(255,255,255,0.1);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
        }
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
            animation: bgPulse 10s ease-in-out infinite;
        }
        @keyframes bgPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        /* 登录页面 */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-box h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box p {
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        .login-box input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        .login-box input:focus {
            border-color: var(--primary);
        }
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .login-error {
            margin-top: 20px;
            padding: 12px;
            background: rgba(220, 53, 69, 0.2);
            color: #ea868f;
            border-radius: 8px;
            display: none;
        }
        
        /* 主页面 */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: none;
        }
        .main-container.active {
            display: block;
        }
        header {
            text-align: center;
            padding: 40px 20px;
        }
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
        }
        .user-bar button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: center;
            padding: 15px 30px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .upload-section {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            margin-bottom: 40px;
            transition: all 0.3s;
        }
        .upload-section.dragover {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.05);
        }
        .upload-icon { font-size: 3rem; margin-bottom: 15px; }
        .upload-text { font-size: 1.2rem; margin-bottom: 10px; }
        .upload-hint { color: var(--text-muted); font-size: 0.9rem; }
        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
        #fileInput { display: none; }
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .status.success { background: rgba(40, 167, 69, 0.2); color: #75b798; display: block; }
        .status.error { background: rgba(220, 53, 69, 0.2); color: #ea868f; display: block; }
        .status.loading { background: rgba(255, 193, 7, 0.2); color: #ffda6a; display: block; }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
        }
        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .photo-wrapper {
            position: relative;
            padding-top: 75%;
            overflow: hidden;
        }
        .photo-wrapper img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .photo-card:hover img { transform: scale(1.05); }
        .photo-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }
        .photo-card:hover .photo-overlay { opacity: 1; }
        .photo-actions {
            display: flex;
            gap: 10px;
        }
        .photo-action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        .photo-action-btn:hover { background: rgba(255,255,255,0.3); }
        .photo-action-btn.delete:hover { background: rgba(220, 53, 69, 0.8); }
        .photo-info { padding: 15px; }
        .photo-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .photo-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            display: none;
        }
        .empty-state.active { display: block; }
        .empty-state svg { width: 100px; height: 100px; margin-bottom: 20px; opacity: 0.3; }
        
        .lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .lightbox-close {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 50px; height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <!-- 登录页面 -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <h1>📸 云端相册</h1>
            <p>请登录以管理照片</p>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="login()">登 录</button>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>
    
    <!-- 主页面 -->
    <div class="main-container" id="mainPage">
        <header>
            <h1>我的云端相册</h1>
        </header>
        
        <div class="user-bar">
            <span id="welcomeUser"></span>
            <button onclick="logout()">退出登录</button>
        </div>
        
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="photoCount">0</div>
                <div class="stat-label">照片数量</div>
            </div>
        </div>
        
        <div class="upload-section" id="dropZone">
            <div class="upload-icon">☁️</div>
            <div class="upload-text">拖拽照片到此处，或点击上传</div>
            <div class="upload-hint">支持 JPG、PNG、GIF、WebP 格式</div>
            <label for="fileInput" class="upload-btn">选择照片</label>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div id="progressText" style="margin-top:10px;color:var(--text-muted)"></div>
            </div>
            <div class="status" id="status"></div>
        </div>
        
        <div class="gallery" id="gallery"></div>
        
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <h2>相册是空的</h2>
            <p>上传你的第一张照片</p>
        </div>
    </div>
    
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">×</button>
        <img src="" id="lightboxImg">
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://diyvcllldrkqjjqfplkt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpeXZjbGxsZHJrcWpqcWZwbGt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDIwNTIsImV4cCI6MjA4OTIxODA1Mn0.zbGYR2KzwVDf3fKFsRbHGszbA_HTfVBRfujdPdrwSX8';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // GitHub 配置
        const CONFIG = {
            owner: 'xiaobubuya',
            repo: 'image',
            branch: 'master',
            cdnBase: 'https://cdn.jsdelivr.net/gh/xiaobubuya/image@master'
        };

        let currentUser = null;
        let githubToken = localStorage.getItem('githubToken') || '';
        let photos = [];

        // 初始化
        init();

        async function init() {
            const savedUser = localStorage.getItem('galleryUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainPage();
            }
        }

        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            if (!username || !password) {
                errorDiv.textContent = '请输入用户名和密码';
                errorDiv.style.display = 'block';
                return;
            }

            try {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('username', username)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    errorDiv.textContent = '用户名或密码错误';
                    errorDiv.style.display = 'block';
                    return;
                }

                currentUser = data;
                localStorage.setItem('galleryUser', JSON.stringify(data));
                
                // 如果没有 GitHub Token，提示输入
                if (!githubToken) {
                    const token = prompt('请输入 GitHub Token 以使用上传功能：');
                    if (token) {
                        localStorage.setItem('githubToken', token);
                        githubToken = token;
                    }
                }
                
                showMainPage();
            } catch (err) {
                errorDiv.textContent = '登录失败，请重试';
                errorDiv.style.display = 'block';
            }
        }

        function showMainPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').classList.add('active');
            document.getElementById('welcomeUser').textContent = `欢迎，${currentUser.username}`;
            loadPhotos();
            setupDragDrop();
        }

        function logout() {
            localStorage.removeItem('galleryUser');
            localStorage.removeItem('githubToken');
            location.reload();
        }

        function setupDragDrop() {
            const dropZone = document.getElementById('dropZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
                dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }, false);
            });
            ['dragenter', 'dragover'].forEach(e => {
                dropZone.addEventListener(e, () => dropZone.classList.add('dragover'), false);
            });
            ['dragleave', 'drop'].forEach(e => {
                dropZone.addEventListener(e, () => dropZone.classList.remove('dragover'), false);
            });
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files), false);
        }

        document.getElementById('fileInput').addEventListener('change', e => handleFiles(e.target.files));

        function showStatus(msg, type) {
            const s = document.getElementById('status');
            s.textContent = msg;
            s.className = 'status ' + type;
            if (type !== 'loading') setTimeout(() => s.className = 'status', 3000);
        }

        function updateProgress(current, total, filename) {
            const c = document.getElementById('progressContainer');
            const f = document.getElementById('progressFill');
            const t = document.getElementById('progressText');
            const pct = total > 0 ? (current / total) * 100 : 0;
            c.classList.add('active');
            f.style.width = pct + '%';
            t.textContent = filename ? `上传中 ${filename} (${current}/${total})` : '';
            if (pct >= 100) setTimeout(() => c.classList.remove('active'), 1000);
        }

        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            if (!files.length) return;
            if (!githubToken) {
                const token = prompt('请输入 GitHub Token：');
                if (!token) return;
                githubToken = token;
                localStorage.setItem('githubToken', token);
            }

            let success = 0;
            for (let i = 0; i < files.length; i++) {
                updateProgress(i + 1, files.length, files[i].name);
                try {
                    await uploadFile(files[i]);
                    success++;
                } catch (e) { console.error(e); }
            }
            updateProgress(files.length, files.length);
            showStatus(success > 0 ? `成功上传 ${success} 张照片` : '上传失败', success > 0 ? 'success' : 'error');
            if (success) setTimeout(loadPhotos, 2000);
            document.getElementById('fileInput').value = '';
        }

        async function uploadFile(file) {
            const filename = `gallery/${Date.now()}_${file.name}`;
            const base64 = await new Promise(r => {
                const reader = new FileReader();
                reader.onload = e => r(e.target.result.split(',')[1]);
                reader.readAsDataURL(file);
            });
            const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${githubToken}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ message: `Upload ${file.name}`, content: base64, branch: CONFIG.branch })
            });
            if (!res.ok) throw new Error('Upload failed');
        }

        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            const empty = document.getElementById('emptyState');
            showStatus('加载中...', 'loading');
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery?ref=${CONFIG.branch}`);
                if (!res.ok) {
                    if (res.status === 404) {
                        photos = [];
                        gallery.innerHTML = '';
                        empty.classList.add('active');
                        showStatus('', '');
                        return;
                    }
                    throw new Error();
                }
                const files = await res.json();
                photos = files.filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name))
                    .sort((a, b) => b.name.localeCompare(a.name));
                document.getElementById('photoCount').textContent = photos.length;
                if (!photos.length) {
                    empty.classList.add('active');
                    gallery.innerHTML = '';
                } else {
                    empty.classList.remove('active');
                    gallery.innerHTML = photos.map((f, i) => {
                        const name = f.name.replace(/^\d+_/, '');
                        const date = new Date(parseInt(f.name.split('_')[0])).toLocaleString('zh-CN');
                        return `
                            <div class="photo-card" onclick="openLightbox(${i})">
                                <div class="photo-wrapper">
                                    <img src="${CONFIG.cdnBase}/gallery/${f.name}" loading="lazy">
                                    <div class="photo-overlay" onclick="event.stopPropagation()">
                                        <div class="photo-actions">
                                            <button class="photo-action-btn" onclick="openLightbox(${i})">👁</button>
                                            <button class="photo-action-btn delete" onclick="deletePhoto('${f.name}', '${f.sha}')">🗑</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="photo-info">
                                    <div class="photo-name">${name}</div>
                                    <div class="photo-date">${date}</div>
                                </div>
                            </div>`;
                    }).join('');
                }
                showStatus(`已加载 ${photos.length} 张照片`, 'success');
                setTimeout(() => showStatus('', ''), 2000);
            } catch (e) {
                showStatus('加载失败', 'error');
            }
        }

        async function deletePhoto(filename, sha) {
            if (!confirm('确定删除？')) return;
            if (!githubToken) {
                const token = prompt('请输入 GitHub Token：');
                if (!token) return;
                githubToken = token;
                localStorage.setItem('githubToken', token);
            }
            showStatus('删除中...', 'loading');
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery/${filename}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ message: `Delete ${filename}`, sha, branch: CONFIG.branch })
                });
                if (!res.ok) throw new Error();
                showStatus('删除成功', 'success');
                setTimeout(loadPhotos, 1000);
            } catch (e) {
                showStatus('删除失败', 'error');
            }
        }

        function openLightbox(i) {
            const f = photos[i];
            if (!f) return;
            document.getElementById('lightboxImg').src = `${CONFIG.cdnBase}/gallery/${f.name}`;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    </script>
</body>
</html>
