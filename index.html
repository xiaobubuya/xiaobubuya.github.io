<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 我们的情侣空间</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 漂浮爱心 -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- 主容器 -->
    <div class="main-container active">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">💕 我们的小天地</div>
            <div class="nav-user">
                <button onclick="toggleSettings()" class="nav-btn" title="设置">⚙️</button>
            </div>
        </nav>

        <!-- 纪念日展示 -->
        <section class="anniversary-section">
            <div class="anniversary-card">
                <h2>💕 我们已经在一起</h2>
                <div class="days-counter">
                    <span id="daysTogether">0</span>
                    <span class="days-label">天</span>
                </div>
                <p id="anniversaryDate">2025年9月18日</p>
                <p class="quote">"每一天和你在一起，都是最好的礼物"</p>
            </div>
        </section>

        <!-- 重要日期倒计时 -->
        <section class="countdown-section">
            <div class="section-header">
                <h2>⏰ 重要日期倒计时</h2>
                <button onclick="toggleAddCountdownPanel()" class="add-btn">+ 添加</button>
            </div>
            <div id="countdownGrid" class="grid-container"></div>
            <div id="emptyCountdown" class="empty-state">
                <p>暂无重要日期</p>
            </div>
        </section>

        <!-- 成就系统 -->
        <section class="achievement-section">
            <div class="section-header">
                <h2>🏆 成就系统</h2>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span id="unlockedCount">0</span>
                    <span>已解锁成就</span>
                </div>
                <div class="stat-item">
                    <span id="achievementProgress">0%</span>
                    <span>总进度</span>
                </div>
            </div>
            <div id="achievementsGrid" class="grid-container"></div>
        </section>

        <!-- 愿望清单 -->
        <section class="wishlist-section">
            <div class="section-header">
                <h2>🌟 愿望清单</h2>
                <button onclick="toggleWishPanel()" class="add-btn">+ 添加愿望</button>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <span id="totalWishes">0</span>
                    <span>总愿望</span>
                </div>
                <div class="stat-item">
                    <span id="completedWishes">0</span>
                    <span>已完成</span>
                </div>
                <div class="stat-item">
                    <span id="pendingWishes">0</span>
                    <span>进行中</span>
                </div>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterWishes('all')">全部</button>
                <button class="filter-btn" onclick="filterWishes('pending')">进行中</button>
                <button class="filter-btn" onclick="filterWishes('completed')">已完成</button>
            </div>
            <div id="wishlistGrid" class="grid-container"></div>
            <div id="emptyWishlist" class="empty-state">
                <p>暂无愿望，添加第一个愿望吧！</p>
            </div>
        </section>

        <!-- 照片墙 -->
        <section class="gallery-section">
            <div class="section-header">
                <h2>📸 我们的美好回忆</h2>
                <div class="gallery-controls">
                    <button onclick="scrollToUpload()" class="control-btn">📸 上传照片</button>
                    <button onclick="toggleSlideshow()" class="control-btn">🎬 幻灯片放映</button>
                    <button onclick="randomPhoto()" class="control-btn">🎲 随机回忆</button>
                </div>
            </div>
            <div class="gallery-stats">
                <div class="stat-item">
                    <span class="stat-icon">📸</span>
                    <span id="photoCount">0</span>
                    <span>甜蜜瞬间</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">📁</span>
                    <span id="folderCount">0</span>
                    <span>回忆相册</span>
                </div>
                <div class="stat-item">
                    <span class="stat-icon">💾</span>
                    <span id="storageUsed">0 MB</span>
                    <span>珍藏容量</span>
                </div>
            </div>
            <div class="filter-bar">
                <select id="folderFilter" onchange="filterPhotos()">
                    <option value="all">所有相册</option>
                </select>
                <select id="timeFilter" onchange="filterPhotos()">
                    <option value="all">所有时间</option>
                    <option value="today">今天</option>
                    <option value="week">本周</option>
                    <option value="month">本月</option>
                    <option value="year">今年</option>
                </select>
                <input type="text" id="searchInput" placeholder="搜索回忆..." oninput="filterPhotos()">
            </div>
            <div id="gallery" class="gallery-grid"></div>
            <div id="emptyState" class="empty-state">
                <p>暂无照片，上传第一张甜蜜回忆吧！</p>
            </div>
            <button id="loadMore" class="load-more-btn" onclick="loadMorePhotos()">加载更多</button>
        </section>

        <!-- 上传区域 -->
        <section id="uploadSection" class="upload-section">
            <div class="section-header">
                <h2>📸 上传我们的甜蜜瞬间</h2>
            </div>
            <div id="dropZone" class="drop-zone">
                <div class="upload-icon">📸</div>
                <p>拖拽照片到此处，或点击选择</p>
                <input type="file" id="fileInput" multiple accept="image/*" hidden>
                <button onclick="document.getElementById('fileInput').click()" class="browse-btn">选择照片</button>
            </div>
            <div id="progressContainer" class="progress-container">
                <div id="progressFill" class="progress-fill"></div>
                <div id="progressText"></div>
            </div>
        </section>
    </div>

    <!-- 设置面板 -->
    <div id="settingsPanel" class="modal-panel">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙️ 设置</h3>
                <button onclick="toggleSettings()" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>纪念日日期</label>
                    <input type="date" id="anniversaryDateInput" onchange="updateAnniversary()">
                </div>
                <div class="setting-item">
                    <label>背景模式</label>
                    <div class="bg-options">
                        <button class="bg-option active" onclick="setBackground('default')">默认</button>
                        <button class="bg-option" onclick="setBackground('gradient')">渐变</button>
                        <button class="bg-option" onclick="setBackground('photo')">照片</button>
                    </div>
                </div>
                <div class="setting-item">
                    <label>背景模糊</label>
                    <input type="range" id="blurSlider" min="0" max="20" value="8" oninput="updateBlur(this.value)">
                    <span id="blurValue">8px</span>
                </div>
                <div class="setting-item">
                    <label>背景暗度</label>
                    <input type="range" id="darknessSlider" min="0" max="100" value="30" oninput="updateDarkness(this.value)">
                    <span id="darknessValue">30%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 愿望面板 -->
    <div id="wishPanel" class="modal-panel">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="wishPanelTitle">➕ 添加愿望</h3>
                <button onclick="toggleWishPanel()" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label>愿望内容</label>
                    <textarea id="wishContent" rows="3" placeholder="写下你的愿望..."></textarea>
                </div>
                <div class="form-item">
                    <label>类别</label>
                    <select id="wishCategory">
                        <option value="travel">✈️ 旅行</option>
                        <option value="food">🍳 美食</option>
                        <option value="gift">🎁 礼物</option>
                        <option value="experience">🎭 体验</option>
                        <option value="skill">📚 技能</option>
                        <option value="other">⭐ 其他</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>优先级</label>
                    <select id="wishPriority">
                        <option value="normal">普通</option>
                        <option value="important">重要</option>
                        <option value="urgent">紧急</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>截止日期</label>
                    <input type="date" id="wishDeadline">
                </div>
                <div class="form-actions">
                    <button onclick="saveWish()" class="submit-btn">保存愿望</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 倒计时面板 -->
    <div id="addCountdownPanel" class="modal-panel">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ 添加重要日期</h3>
                <button onclick="toggleAddCountdownPanel()" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-item">
                    <label>日期名称</label>
                    <input type="text" id="countdownName" placeholder="例如：生日、纪念日">
                </div>
                <div class="form-item">
                    <label>日期</label>
                    <input type="date" id="countdownDate">
                </div>
                <div class="form-item">
                    <label>类型</label>
                    <select id="countdownType">
                        <option value="birthday">🎂 生日</option>
                        <option value="anniversary">💕 纪念日</option>
                        <option value="travel">✈️ 旅行</option>
                        <option value="event">📅 事件</option>
                        <option value="custom">⭐ 自定义</option>
                    </select>
                </div>
                <div class="form-item">
                    <label>每年重复</label>
                    <input type="checkbox" id="countdownRepeat" checked>
                </div>
                <div class="form-actions">
                    <button onclick="addCountdown()" class="submit-btn">添加日期</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 灯光箱 -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button onclick="closeLightbox()" class="lightbox-close">×</button>
            <img id="lightboxImg" src="" alt="">
            <div class="lightbox-info">
                <h3 id="lightboxTitle"></h3>
                <p id="lightboxMeta"></p>
            </div>
            <button onclick="prevPhoto()" class="lightbox-prev">‹</button>
            <button onclick="nextPhoto()" class="lightbox-next">›</button>
        </div>
    </div>

    <!-- 音乐播放器 -->
    <div class="music-player">
        <button class="music-icon" onclick="toggleMusicPlayer()">🎵</button>
        <iframe id="musicFrame" class="music-frame" src="https://music.163.com/outchain/player?type=2&id=1868541234&auto=0&height=66" frameborder="no" border="0" marginwidth="0" marginheight="0" width="300" height="66"></iframe>
    </div>

    <script src="app.js"></script>
</body>
</html>
