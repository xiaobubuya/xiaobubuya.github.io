<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .upload-area {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        #fileInput {
            display: none;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .photo-card:hover {
            transform: translateY(-5px);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .photo-info {
            padding: 15px;
        }
        .photo-info p {
            color: #666;
            font-size: 0.9rem;
        }
        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.7;
        }
        .tips {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        .tips code {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 我的云端相册</h1>
            <p>简单、轻量的在线照片管理</p>
        </header>

        <div class="upload-area">
            <label for="fileInput" class="upload-btn">
                📤 选择照片上传
            </label>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <p style="margin-top: 15px; color: #666;">支持 JPG、PNG、GIF 格式</p>
        </div>

        <div class="gallery" id="gallery">
            <!-- 照片将显示在这里 -->
        </div>

        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <h2>相册是空的</h2>
            <p>点击上方按钮上传你的第一张照片</p>
        </div>

        <div class="tips">
            <strong>💡 提示：</strong>由于这是纯静态网站，上传的照片仅在当前浏览器会话中显示。<br>
            如需永久保存，请使用 <code>git add</code> 和 <code>git push</code> 将照片提交到仓库。
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const gallery = document.getElementById('gallery');
        const emptyState = document.getElementById('emptyState');
        let photos = JSON.parse(localStorage.getItem('galleryPhotos') || '[]');

        function renderGallery() {
            if (photos.length === 0) {
                gallery.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            gallery.style.display = 'grid';
            emptyState.style.display = 'none';
            gallery.innerHTML = photos.map((photo, index) => `
                <div class="photo-card">
                    <img src="${photo.data}" alt="${photo.name}">
                    <div class="photo-info">
                        <p>${photo.name}</p>
                        <p style="font-size: 0.8rem; color: #999;">${new Date(photo.date).toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
        }

        fileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            
            files.forEach(file => {
                if (!file.type.startsWith('image/')) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    photos.unshift({
                        name: file.name,
                        data: event.target.result,
                        date: new Date().toISOString()
                    });
                    localStorage.setItem('galleryPhotos', JSON.stringify(photos));
                    renderGallery();
                };
                reader.readAsDataURL(file);
            });
        });

        // 初始化渲染
        renderGallery();
    </script>
</body>
</html>
