<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的云端相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: white;
            padding: 40px 0;
        }
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .token-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .token-section input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-top: 10px;
        }
        .token-section input:focus {
            outline: none;
            border-color: #667eea;
        }
        .token-section button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
            transition: transform 0.3s;
        }
        .token-section button:hover {
            transform: translateY(-2px);
        }
        .upload-area {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .upload-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .upload-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        #fileInput {
            display: none;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }
        .progress-bar.active {
            display: block;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            position: relative;
        }
        .photo-card:hover {
            transform: translateY(-5px);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .photo-info {
            padding: 15px;
        }
        .photo-info p {
            color: #666;
            font-size: 0.9rem;
        }
        .photo-date {
            font-size: 0.8rem;
            color: #999;
        }
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255,0,0,0.8);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: none;
        }
        .photo-card:hover .delete-btn {
            display: block;
        }
        .empty-state {
            text-align: center;
            color: white;
            padding: 60px 20px;
        }
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.7;
        }
        .refresh-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            background: white;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 我的云端相册</h1>
            <p>照片自动同步到 GitHub</p>
        </header>

        <div class="token-section">
            <label><strong>GitHub Token</strong>（用于上传照片到仓库）</label>
            <input type="password" id="githubToken" placeholder="输入你的 GitHub Personal Access Token">
            <button onclick="saveToken()">保存 Token</button>
            <p style="margin-top: 10px; color: #666; font-size: 0.85rem;">
                Token 仅保存在浏览器本地，不会上传到任何服务器
            </p>
        </div>

        <div class="upload-area">
            <label for="fileInput" class="upload-btn" id="uploadBtn">
                📤 选择照片上传
            </label>
            <input type="file" id="fileInput" accept="image/*" multiple>
            <p style="margin-top: 15px; color: #666;">支持 JPG、PNG、GIF 格式</p>
            
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status" id="status"></div>
        </div>

        <div style="text-align: center; margin-bottom: 20px;">
            <button class="refresh-btn" onclick="loadPhotos()">🔄 刷新相册</button>
        </div>

        <div class="gallery" id="gallery"></div>

        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <h2>相册是空的</h2>
            <p>点击上方按钮上传你的第一张照片</p>
        </div>
    </div>

    <script>
        const CONFIG = {
            owner: 'xiaobubuya',
            repo: 'image',
            branch: 'master',
            cdnBase: 'https://cdn.jsdelivr.net/gh/xiaobubuya/image@master'
        };

        let githubToken = localStorage.getItem('githubToken') || '';
        
        // 初始化
        if (githubToken) {
            document.getElementById('githubToken').value = githubToken;
        }
        loadPhotos();

        function saveToken() {
            const token = document.getElementById('githubToken').value.trim();
            if (token) {
                localStorage.setItem('githubToken', token);
                githubToken = token;
                showStatus('Token 已保存', 'success');
            } else {
                showStatus('请输入 Token', 'error');
            }
        }

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            if (type !== 'loading') {
                setTimeout(() => status.className = 'status', 3000);
            }
        }

        function updateProgress(percent) {
            const bar = document.getElementById('progressBar');
            const fill = document.getElementById('progressFill');
            bar.classList.add('active');
            fill.style.width = percent + '%';
            if (percent >= 100) {
                setTimeout(() => bar.classList.remove('active'), 500);
            }
        }

        // 上传照片
        document.getElementById('fileInput').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            if (!githubToken) {
                showStatus('请先输入并保存 GitHub Token', 'error');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.classList.add('disabled');
            uploadBtn.style.pointerEvents = 'none';

            let successCount = 0;
            let failCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;

                updateProgress((i / files.length) * 100);
                showStatus(`正在上传 ${file.name}...`, 'loading');

                try {
                    await uploadToGitHub(file);
                    successCount++;
                } catch (error) {
                    console.error('Upload failed:', error);
                    failCount++;
                }
            }

            updateProgress(100);
            uploadBtn.classList.remove('disabled');
            uploadBtn.style.pointerEvents = 'auto';

            if (successCount > 0) {
                showStatus(`成功上传 ${successCount} 张照片${failCount > 0 ? `，${failCount} 张失败` : ''}`, 'success');
                // 等待 CDN 刷新后加载照片
                setTimeout(loadPhotos, 2000);
            } else {
                showStatus('上传失败，请检查 Token 是否正确', 'error');
            }

            // 清空 input
            e.target.value = '';
        });

        async function uploadToGitHub(file) {
            const timestamp = Date.now();
            const filename = `gallery/${timestamp}_${file.name}`;
            
            // 读取文件为 base64
            const base64Content = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const base64 = e.target.result.split(',')[1];
                    resolve(base64);
                };
                reader.readAsDataURL(file);
            });

            // 上传到 GitHub
            const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${filename}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${githubToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Upload ${file.name}`,
                    content: base64Content,
                    branch: CONFIG.branch
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message);
            }

            return response.json();
        }

        // 加载照片
        async function loadPhotos() {
            const gallery = document.getElementById('gallery');
            const emptyState = document.getElementById('emptyState');

            showStatus('正在加载照片...', 'loading');

            try {
                // 获取仓库文件列表
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery?ref=${CONFIG.branch}`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        // gallery 目录不存在
                        gallery.style.display = 'none';
                        emptyState.style.display = 'block';
                        showStatus('', '');
                        return;
                    }
                    throw new Error('Failed to load photos');
                }

                const files = await response.json();
                const imageFiles = files.filter(f => 
                    f.type === 'file' && 
                    /\.(jpg|jpeg|png|gif|webp)$/i.test(f.name)
                ).sort((a, b) => b.name.localeCompare(a.name)); // 最新的在前

                if (imageFiles.length === 0) {
                    gallery.style.display = 'none';
                    emptyState.style.display = 'block';
                    showStatus('', '');
                    return;
                }

                gallery.style.display = 'grid';
                emptyState.style.display = 'none';

                gallery.innerHTML = imageFiles.map(file => {
                    const name = file.name.replace(/^\d+_/, ''); // 去掉时间戳前缀
                    const date = new Date(parseInt(file.name.split('_')[0])).toLocaleString();
                    
                    return `
                        <div class="photo-card">
                            <button class="delete-btn" onclick="deletePhoto('${file.name}', '${file.sha}')">×</button>
                            <img src="${CONFIG.cdnBase}/gallery/${file.name}" alt="${name}" loading="lazy">
                            <div class="photo-info">
                                <p>${name}</p>
                                <p class="photo-date">${date}</p>
                            </div>
                        </div>
                    `;
                }).join('');

                showStatus(`已加载 ${imageFiles.length} 张照片`, 'success');
                setTimeout(() => showStatus('', ''), 2000);

            } catch (error) {
                console.error('Load photos failed:', error);
                gallery.style.display = 'none';
                emptyState.style.display = 'block';
                showStatus('加载失败，请稍后重试', 'error');
            }
        }

        // 删除照片
        async function deletePhoto(filename, sha) {
            if (!confirm('确定要删除这张照片吗？')) return;

            if (!githubToken) {
                showStatus('请先输入 GitHub Token', 'error');
                return;
            }

            showStatus('正在删除...', 'loading');

            try {
                const response = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/gallery/${filename}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Delete ${filename}`,
                        sha: sha,
                        branch: CONFIG.branch
                    })
                });

                if (!response.ok) throw new Error('Delete failed');

                showStatus('删除成功', 'success');
                setTimeout(loadPhotos, 1000);
            } catch (error) {
                showStatus('删除失败', 'error');
            }
        }
    </script>
</body>
</html>
